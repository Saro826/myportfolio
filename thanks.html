<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You! — Sangili Saravana</title>
<link rel="stylesheet" href="style.css">
<style>
  .thanks-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .thanks-card {
    padding: 4rem 3rem;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .check-icon {
    width: 80px;
    height: 80px;
    background: rgba(255, 107, 0, 0.1);
    color: var(--accent);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.5s ease both;
  }

  .thanks-title {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .thanks-msg {
    font-size: 1.05rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    line-height: 1.6;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .back-btn {
    animation: fadeUp 0.8s 0.3s ease both;
  }
</style>
</head>
<body>

<div class="thanks-container">
  <div class="glass-card thanks-card">
    <div class="check-icon">✓</div>
    <h1 class="thanks-title">Thanks for reaching out!</h1>
    <p class="thanks-msg">I have received your message. I'll get back to you as soon as possible.</p>
    <a href="index.html" class="btn-primary back-btn">← Back to Home</a>
  </div>
</div>

</body>
</html>
